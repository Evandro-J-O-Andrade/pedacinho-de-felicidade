<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#863BFF"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="white" opacity="0.1"/>
  <circle cx="700" cy="500" r="120" fill="white" opacity="0.1"/>
  <circle cx="650" cy="150" r="50" fill="white" opacity="0.1"/>
  
  <!-- Title -->
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">NOVIDADES</text>
  <text x="400" y="310" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">EM BREVE!</text>
  
  <!-- Subtitle -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle" opacity="0.9">Fique ligado</text>
  
  <!-- Decorative line -->
  <rect x="250" y="410" width="300" height="3" fill="white" opacity="0.5" rx="2"/>
  
  <!-- Heart icon -->
  <path d="M400 470 C380 450 350 460 350 485 C350 510 400 540 400 540 C400 540 450 510 450 485 C450 460 420 450 400 470" fill="white"/>
  
  <!-- Pedacinhos text -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.8">Pedacinhos de Felicidade</text>
</svg>